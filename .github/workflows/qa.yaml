name: authd QA & sanity checks
on:
  push:
    branches:
      - main
    tags:
      - "*"
  pull_request:
    paths:
      - '**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go-sanity:
    name: "Test"
    permissions: {}
    runs-on: ubuntu-24.04 # ubuntu-latest-runner
    steps:
      - name: Test
        run: |
          echo "::group::Check token has no contents:write permissions"                                        
          echo "::error::Example error message in group"
          echo "::warning::Example warning message in group"
          echo "::notice title=Example notice::Example notice message in group"
          echo "::debug::Example debug message in group"
          echo "::endgroup::"
          echo "::error::Example error message"
          echo "::warning::Example warning message"
          echo "::notice title=Example notice::Example notice message"
          echo "::debug::Example debug message"          
          echo "✅ Success!"
          echo "❌ Failure!"          
          echo "⚠️ Skipped!"

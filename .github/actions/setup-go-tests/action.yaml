name: 'Setup Go Tests'
description: 'Common setup steps for Go tests'
inputs:
  restore-lxd-image-cache:
    description: "Whether to restore/import the cached LXD test image"
    required: false
    default: "true"
outputs:
  lxd-image-cache-hit:
    description: "Whether the LXD test image cache was hit"
    value: ${{ steps.restore-lxd-test-image.outputs.cache-hit }}
  lxd-image-cache-matched-key:
    description: "Matched key for restored LXD test image cache (empty if none)"
    value: ${{ steps.restore-lxd-test-image.outputs.cache-matched-key }}
  lxd-image-cache-primary-key:
    description: "Primary key for the LXD test image cache"
    value: ${{ steps.compute-lxd-test-image-cache-key.outputs.primary-key }}
runs:
  using: 'composite'
  steps:
    - uses: actions/setup-go@v6
      with:
        go-version-file: go.mod

    - uses: canonical/desktop-engineering/gh-actions/common/dpkg-install-speedup@main

    - name: Install dependencies
      shell: bash
      run: |
        # Install dependencies
        set -eu
        echo "::group::Install dependencies"

        sudo apt-get update

        # Disable the php8.3-fpm.service which is enabled by default on ubuntu-latest-runner
        # and is restarted when installing the dependencies but times out after 90s.
        sudo systemctl mask --now php8.3-fpm.service || true

        # The integration tests build the NSS crate, so we need the cargo build dependencies in order to run them.
        sudo apt-get install -y protobuf-compiler

        sudo apt-get install -y ${{ env.go_build_dependencies }} ${{ env.go_test_dependencies}}

        echo "::endgroup::"

    - name: Setup LXD
      if: env.AUTHD_TESTS_USE_LXD == 'true'
      uses: canonical/setup-lxd@main

    - name: Set LXD Ubuntu version
      if: env.AUTHD_TESTS_USE_LXD == 'true'
      shell: bash
      run: echo "LXD_UBUNTU_VERSION=2604" >> "$GITHUB_ENV"

    - name: Compute LXD image cache rotation bucket
      if: env.AUTHD_TESTS_USE_LXD == 'true'
      shell: bash
      run: echo AUTHD_TESTS_LXD_CACHE_BUCKET="$(date -u +%G-W%V)" >> "$GITHUB_ENV"

    - name: Compute LXD image cache key
      id: compute-lxd-test-image-cache-key
      if: env.AUTHD_TESTS_USE_LXD == 'true'
      shell: bash
      run: |
        set -eu
        echo "primary-key=authd-lxd-test-image-${{ runner.os }}-ubuntu-${{ env.LXD_UBUNTU_VERSION }}-${{ hashFiles(
          'debian/control',
          'debian/get-depends-go-bin-path.sh',
          'debian/get-depends-cargo-bin-paths.sh',
          'internal/testutils/lxd.go',
          '.github/actions/setup-go-tests/action.yaml',
          '.github/workflows/qa.yaml'
        ) }}-${AUTHD_TESTS_LXD_CACHE_BUCKET}" >> "$GITHUB_OUTPUT"

    - name: Restore cached LXD test image
      id: restore-lxd-test-image
      if: env.AUTHD_TESTS_USE_LXD == 'true' && inputs.restore-lxd-image-cache == 'true'
      uses: actions/cache/restore@v5
      with:
        path: ${{ runner.temp }}/authd-lxd-image-cache/ubuntu-${{ env.LXD_UBUNTU_VERSION }}.tar
        key: ${{ steps.compute-lxd-test-image-cache-key.outputs.primary-key }}
        restore-keys: |
          authd-lxd-test-image-${{ runner.os }}-ubuntu-${{ env.LXD_UBUNTU_VERSION }}-${{ hashFiles(
            'debian/control',
            'debian/get-depends-go-bin-path.sh',
            'debian/get-depends-cargo-bin-paths.sh',
            'internal/testutils/lxd.go',
            '.github/actions/setup-go-tests/action.yaml',
            '.github/workflows/qa.yaml'
          ) }}-
          authd-lxd-test-image-${{ runner.os }}-ubuntu-${{ env.LXD_UBUNTU_VERSION }}-

    - name: Import cached LXD test image
      if: env.AUTHD_TESTS_USE_LXD == 'true' && inputs.restore-lxd-image-cache == 'true' && steps.restore-lxd-test-image.outputs.cache-hit == 'true'
      shell: bash
      run: |
        set -euo pipefail
        set -x
        image_tar="${{ runner.temp }}/authd-lxd-image-cache/ubuntu-${LXD_UBUNTU_VERSION}.tar"
        alias="authd-test-cache-${LXD_UBUNTU_VERSION}"
        lxc project show authd-tests || lxc project create authd-tests -c features.profiles=false
        lxc --project authd-tests image delete "${alias}" || true
        lxc --project authd-tests image import "${image_tar}" --alias "${alias}"
        echo AUTHD_TESTS_LXD_IMAGE_2604_ALIAS="${alias}" >> "$GITHUB_ENV"

    - name: Install gotestfmt and our wrapper script
      uses: canonical/desktop-engineering/gh-actions/go/gotestfmt@main

    - name: Install latest Rust version
      shell: bash
      run: rustup update stable

    - name: Prepare tests artifacts path
      shell: bash
      run: |
        # Prepare tests artifacts path
        set -eu

        artifacts_dir=$(mktemp -d --tmpdir authd-test-artifacts-XXXXXX)
        echo AUTHD_TESTS_ARTIFACTS_PATH="${artifacts_dir}" >> $GITHUB_ENV

        echo ASAN_OPTIONS="log_path=${artifacts_dir}/asan.log:print_stats=true" >> $GITHUB_ENV
